version: '3.8'

services:
  app:
    build: .
    container_name: zeus-mcp-diagnosis-container
    ports:
      - "6001:6001"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PORT=6001
      - ENVIRONMENT=development
    restart: unless-stopped
