# Build, push to Artifact Registry, deploy to Cloud Run.
# Prerequisites: enable APIs, create Artifact Registry repo, create secrets (see docs/olympus-ai-backend/DEPLOY_GCP.md).
# GitHub trigger (push main): see ci/cloudbuild-github-trigger-olympus-main.yaml and docs/olympus-ai-backend/DEPLOY_GCP.md.

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: olympus-ai-backend
  _ARTIFACT_REPO: olympus-ai-backend
  _IMAGE_TAG: latest
  _ENVIRONMENT: accept
  _MCP_DIAGNOSIS_BASE_URL: "MUST_BE_SET_BY_TRIGGER"
  _MCP_DIAGNOSIS_TIMEOUT_SECONDS: "300"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/olympus-ai-backend:${_IMAGE_TAG}"
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/olympus-ai-backend:${_IMAGE_TAG}"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/olympus-ai-backend:${_IMAGE_TAG}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - managed
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - >-
        ENVIRONMENT=${_ENVIRONMENT},MCP_DIAGNOSIS_BASE_URL=${_MCP_DIAGNOSIS_BASE_URL},MCP_DIAGNOSIS_TIMEOUT_SECONDS=${_MCP_DIAGNOSIS_TIMEOUT_SECONDS}
      - "--set-secrets"
      - >-
        OPENAI_API_KEY=OPENAI_API_KEY:latest,TAVILY_API_KEY=TAVILY_API_KEY:latest,MCP_DIAGNOSIS_AUTH_TOKEN=MCP_DIAGNOSIS_AUTH_TOKEN:latest,AUTH_API_KEY=OLYMPUS_AUTH_API_KEY:latest,RAGIE_API_KEY=RAGIE_API_KEY:latest
